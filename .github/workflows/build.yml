name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            binary: fishrouter
          - os: windows-latest
            name: windows-amd64
            binary: fishrouter.exe
          - os: macos-latest
            name: macos-arm64
            binary: fishrouter
          - os: macos-13
            name: macos-amd64
            binary: fishrouter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --name fishrouter \
            --onefile \
            --add-data "static:static" \
            --add-data "config.example.json:." \
            --hidden-import app.main \
            --hidden-import app.config \
            --hidden-import app.api \
            --hidden-import app.backends \
            --hidden-import app.core \
            --hidden-import app.web \
            --hidden-import uvicorn \
            --hidden-import fastapi \
            --hidden-import httpx \
            app/main.py

      - name: Prepare release assets
        run: |
          mkdir -p release/fishrouter
          cp dist/fishrouter* release/fishrouter/
          cp config.example.json release/fishrouter/config.json
          cp README.md release/fishrouter/
          cd release && tar -czf fishrouter-${{ matrix.name }}.tar.gz fishrouter

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fishrouter-${{ matrix.name }}
          path: release/fishrouter-${{ matrix.name }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
