name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-server:
    name: Build Server ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: windows-latest
            name: windows-amd64
          - os: macos-latest
            name: macos-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build server
        shell: bash
        run: |
          pyinstaller server.spec

      - name: Prepare server package
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/fishrouter-server.exe release/
          else
            cp dist/fishrouter-server release/
          fi
          cp config.example.json release/config.json
          cp README.md release/
          cd release && tar -czf ../fishrouter-server-${{ matrix.name }}.tar.gz *

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: fishrouter-server-${{ matrix.name }}
          path: fishrouter-server-${{ matrix.name }}.tar.gz

  build-windows-gui:
    name: Build Windows GUI + MSI Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build server binary
        shell: bash
        run: |
          pyinstaller server.spec

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm install --no-audit --no-fund
          npm run build
          cd ..

      - name: Build launcher (WebView2)
        shell: bash
        run: |
          pip install pywebview requests
          pyinstaller launcher.spec --clean

      - name: Prepare portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path portable -Force
          Copy-Item dist/FishRouter.exe portable/
          Copy-Item dist/fishrouter-server.exe portable/
          Copy-Item config.example.json portable/config.json
          Copy-Item static portable/ -Recurse
          Copy-Item README.md portable/
          Compress-Archive -Path portable/* -DestinationPath FishRouter-Windows-Portable.zip

      - name: Generate version
        id: version
        shell: bash
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          echo "version=0.$COMMIT_COUNT.0" >> $GITHUB_OUTPUT

      - name: Copy files for installer
        shell: pwsh
        run: |
          # Copy exe files
          Copy-Item dist/FishRouter.exe .
          Copy-Item dist/fishrouter-server.exe .
          Copy-Item config.example.json config.json
          # static folder already exists from frontend build

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI Installer
        shell: cmd
        run: |
          dir static
          dir static\dist
          dir static\dist\assets
          "C:\Program Files (x86)\WiX Toolset v3.14\bin\candle.exe" -dVersion=${{ steps.version.outputs.version }} installer.wxs
          "C:\Program Files (x86)\WiX Toolset v3.14\bin\light.exe" -ext WixUIExtension installer.wixobj -out FishRouter-Setup.msi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FishRouter-Windows
          path: |
            FishRouter-Windows-Portable.zip
            FishRouter-Setup.msi

  release:
    name: Create Release
    needs: [build-server, build-windows-gui]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate version tag
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="v0.$COMMIT_COUNT"
          TAG="$VERSION-$SHORT_SHA"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          {
            echo "CHANGELOG<<CHANGELOG_EOF"
            echo "## 📦 FishRouter $(date '+%Y-%m-%d %H:%M')"
            echo ""
            echo "**Version:** ${{ steps.version.outputs.version }} (${{ steps.version.outputs.tag }})"
            echo "**Commits:** $(git rev-list --count HEAD) total"
            echo ""
            echo "### 📝 Latest Changes"
            echo ""
            git log --pretty=format:"- %s (%h)" -20
            echo ""
            echo ""
            echo "### 📥 Downloads"
            echo ""
            echo "#### 🪟 Windows"
            echo "- **MSI Installer** (推荐 | Recommended): FishRouter-Setup.msi"
            echo "- **Portable** (单文件开箱即用 | No install): FishRouter-Windows-Portable.zip"
            echo ""
            echo "#### 🐧 Linux"
            echo "- **一键安装 | One-click**: \`curl -sSL https://raw.githubusercontent.com/Aobing-code/fishrouter/main/install.sh | sudo bash\`"
            echo "- **Server AMD64**: fishrouter-server-linux-amd64.tar.gz"
            echo "- **Server ARM64**: fishrouter-server-linux-arm64.tar.gz"
            echo ""
            echo "#### 🍎 macOS"
            echo "- **Apple Silicon**: fishrouter-server-macos-arm64.tar.gz"
            echo ""
            echo "### 🏗️ Build Targets"
            echo ""
            echo "- 🐧 Linux AMD64"
            echo "- 🐧 Linux ARM64"
            echo "- 🪟 Windows AMD64 (MSI Installer + Portable ZIP)"
            echo "- 🍎 macOS ARM64 (Apple Silicon)"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Delete existing tag if exists
        run: |
          git tag -d ${{ steps.version.outputs.tag }} 2>/dev/null || true
          git push --delete origin ${{ steps.version.outputs.tag }} 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "FishRouter ${{ steps.version.outputs.version }}"
          body: ${{ steps.notes.outputs.CHANGELOG }}
          files: |
            artifacts/FishRouter-Windows/FishRouter-Setup.msi
            artifacts/FishRouter-Windows/FishRouter-Windows-Portable.zip
            artifacts/fishrouter-server-linux-amd64/*.tar.gz
            artifacts/fishrouter-server-linux-arm64/*.tar.gz
            artifacts/fishrouter-server-macos-arm64/*.tar.gz
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
