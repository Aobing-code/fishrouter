name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
          - os: windows-latest
            name: windows-amd64
          - os: macos-latest
            name: macos-arm64
          - os: macos-13
            name: macos-amd64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --name fishrouter \
            --onefile \
            --add-data "static:static" \
            --add-data "config.example.json:." \
            --hidden-import app.main \
            --hidden-import app.config \
            --hidden-import app.api \
            --hidden-import app.backends \
            --hidden-import app.core \
            --hidden-import app.web \
            --hidden-import uvicorn \
            --hidden-import fastapi \
            --hidden-import httpx \
            app/main.py

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/fishrouter.exe release/
            cp config.example.json release/config.json
            cp README.md release/
            cd release && tar -czf ../fishrouter-${{ matrix.name }}.tar.gz *
          else
            cp dist/fishrouter release/
            cp config.example.json release/config.json
            cp README.md release/
            cd release && tar -czf ../fishrouter-${{ matrix.name }}.tar.gz *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fishrouter-${{ matrix.name }}
          path: fishrouter-${{ matrix.name }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate version tag
        id: version
        run: |
          # Count total commits for version number
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="v0.$COMMIT_COUNT"
          TAG="$VERSION-$SHORT_SHA"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          # Get last 20 commits for release notes
          echo 'CHANGELOG<<EOF' >> $GITHUB_OUTPUT
          echo "## 📦 FishRouter $(date '+%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Version:** ${{ steps.version.outputs.version }} (${{ steps.version.outputs.tag }})" >> $GITHUB_OUTPUT
          echo "**Commits:** $(git rev-list --count HEAD) total" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 📝 Latest Changes" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" -20 >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 🏗️ Build Targets" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "- 🐧 Linux AMD64" >> $GITHUB_OUTPUT
          echo "- 🪟 Windows AMD64" >> $GITHUB_OUTPUT
          echo "- 🍎 macOS ARM64 (Apple Silicon)" >> $GITHUB_OUTPUT
          echo "- 🍎 macOS AMD64 (Intel)" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Delete existing tag if exists
        run: |
          git tag -d ${{ steps.version.outputs.tag }} 2>/dev/null || true
          git push --delete origin ${{ steps.version.outputs.tag }} 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "FishRouter ${{ steps.version.outputs.version }}"
          body: ${{ steps.notes.outputs.CHANGELOG }}
          files: artifacts/**/*.tar.gz
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
