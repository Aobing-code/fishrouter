name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-server:
    name: Build Server ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
          - os: windows-latest
            name: windows-amd64
          - os: macos-latest
            name: macos-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build server
        shell: bash
        run: |
          pyinstaller --name fishrouter-server \
            --onefile \
            --add-data "static:static" \
            --add-data "config.example.json:." \
            --hidden-import app.main \
            --hidden-import app.config \
            --hidden-import app.api \
            --hidden-import app.backends \
            --hidden-import app.core \
            --hidden-import app.web \
            --hidden-import uvicorn \
            --hidden-import fastapi \
            --hidden-import httpx \
            app/main.py

      - name: Prepare server package
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/fishrouter-server.exe release/
          else
            cp dist/fishrouter-server release/
          fi
          cp config.example.json release/config.json
          cp README.md release/
          cd release && tar -czf ../fishrouter-server-${{ matrix.name }}.tar.gz *

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: fishrouter-server-${{ matrix.name }}
          path: fishrouter-server-${{ matrix.name }}.tar.gz

  build-windows-gui:
    name: Build Windows GUI + MSI
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build server binary
        shell: bash
        run: |
          pyinstaller --name fishrouter-server \
            --onefile \
            --add-data "static;static" \
            --add-data "config.example.json;." \
            --hidden-import app.main \
            --hidden-import app.config \
            --hidden-import app.api \
            --hidden-import app.backends \
            --hidden-import app.core \
            --hidden-import app.web \
            --hidden-import uvicorn \
            --hidden-import fastapi \
            --hidden-import httpx \
            app/main.py

      - name: Build GUI
        shell: bash
        run: |
          pyinstaller --name FishRouter \
            --onefile \
            --windowed \
            app/gui.py

      - name: Prepare portable package
        shell: bash
        run: |
          mkdir -p portable
          cp dist/FishRouter.exe portable/
          cp dist/fishrouter-server.exe portable/
          cp config.example.json portable/config.json
          cp README.md portable/
          cd portable && tar -czf ../FishRouter-Windows-Portable.tar.gz *

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Generate version
        id: version
        shell: bash
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          echo "version=0.$COMMIT_COUNT.0" >> $GITHUB_OUTPUT

      - name: Create NSIS installer script
        shell: bash
        run: |
          cat > installer.nsi << 'NSISEOF'
          !include "MUI2.nsh"

          Name "FishRouter"
          OutFile "FishRouter-Setup.exe"
          InstallDir "$PROGRAMFILES64\FishRouter"
          RequestExecutionLevel admin

          !define MUI_ICON ""
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath "$INSTDIR"
            File "FishRouter.exe"
            File "fishrouter-server.exe"
            File "config.json"
            File "README.md"

            CreateDirectory "$SMPROGRAMS\FishRouter"
            CreateShortCut "$SMPROGRAMS\FishRouter\FishRouter.lnk" "$INSTDIR\FishRouter.exe"
            CreateShortCut "$DESKTOP\FishRouter.lnk" "$INSTDIR\FishRouter.exe"

            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\FishRouter" "DisplayName" "FishRouter"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\FishRouter" "UninstallString" "$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\FishRouter" "InstallLocation" "$INSTDIR"
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\FishRouter" "NoModify" 1
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\FishRouter" "NoRepair" 1

            WriteUninstaller "$INSTDIR\uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "$INSTDIR\*.*"
            RMDir "$INSTDIR"
            Delete "$SMPROGRAMS\FishRouter\FishRouter.lnk"
            RMDir "$SMPROGRAMS\FishRouter"
            Delete "$DESKTOP\FishRouter.lnk"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\FishRouter"
          SectionEnd
          NSISEOF

      - name: Build EXE Installer
        shell: cmd
        run: |
          copy dist\FishRouter.exe FishRouter.exe
          copy dist\fishrouter-server.exe fishrouter-server.exe
          copy config.example.json config.json
          copy README.md README.md
          makensis installer.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FishRouter-Windows
          path: |
            FishRouter-Windows-Portable.tar.gz
            FishRouter-Setup.msi

  release:
    name: Create Release
    needs: [build-server, build-windows-gui]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate version tag
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="v0.$COMMIT_COUNT"
          TAG="$VERSION-$SHORT_SHA"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          echo 'CHANGELOG<<EOF' >> $GITHUB_OUTPUT
          echo "## 📦 FishRouter $(date '+%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Version:** ${{ steps.version.outputs.version }} (${{ steps.version.outputs.tag }})" >> $GITHUB_OUTPUT
          echo "**Commits:** $(git rev-list --count HEAD) total" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 📝 Latest Changes" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" -20 >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 📥 Downloads" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "#### 🪟 Windows" >> $GITHUB_OUTPUT
          echo "- **EXE Installer** (推荐 | Recommended): FishRouter-Setup.exe" >> $GITHUB_OUTPUT
          echo "- **Portable** (单文件开箱即用 | No install): FishRouter-Windows-Portable.tar.gz" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "#### 🐧 Linux" >> $GITHUB_OUTPUT
          echo "- **一键安装 | One-click**: \`curl -sSL https://raw.githubusercontent.com/Aobing-code/fishrouter/main/install.sh | sudo bash\`" >> $GITHUB_OUTPUT
          echo "- **Server Binary**: fishrouter-server-linux-amd64.tar.gz" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "#### 🍎 macOS" >> $GITHUB_OUTPUT
          echo "- **Apple Silicon**: fishrouter-server-macos-arm64.tar.gz" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 🏗️ Build Targets" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "- 🐧 Linux AMD64" >> $GITHUB_OUTPUT
          echo "- 🪟 Windows AMD64 (EXE Installer + Portable)" >> $GITHUB_OUTPUT
          echo "- 🍎 macOS ARM64 (Apple Silicon)" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Delete existing tag if exists
        run: |
          git tag -d ${{ steps.version.outputs.tag }} 2>/dev/null || true
          git push --delete origin ${{ steps.version.outputs.tag }} 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "FishRouter ${{ steps.version.outputs.version }}"
          body: ${{ steps.notes.outputs.CHANGELOG }}
          files: |
            artifacts/FishRouter-Windows/FishRouter-Setup.exe
            artifacts/FishRouter-Windows/FishRouter-Windows-Portable.tar.gz
            artifacts/fishrouter-server-linux-amd64/*.tar.gz
            artifacts/fishrouter-server-macos-arm64/*.tar.gz
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
